name: Build and Deploy Remotes

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_all_remotes:
        description: "Build every remote in remotes.json (recovery if git diff or storage check skipped a remote)"
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Detect changed remotes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.build_all_remotes }}" = "true" ]; then
            dirs=$(jq -r '.[].name | ascii_downcase' host/public/remotes.json | xargs)
            echo "Building all remotes (workflow_dispatch): $dirs"
          else
            base="${{ github.event.before }}"
            if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base=$(git rev-parse HEAD^ 2>/dev/null || echo "")
            fi
            if [ -n "$base" ]; then
              dirs=$(git diff --name-only "$base" "$GITHUB_SHA" -- remotes | awk -F/ '/^remotes\/[^\/]+\//{print $2}' | sort -u | xargs)
            else
              dirs=""
            fi
          fi
          echo "CHANGED_REMOTES=$dirs" >> $GITHUB_ENV

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure $web container exists
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az storage container create --account-name uiremotes -n '$web' --auth-mode login

      - name: Detect new remotes missing from storage
        uses: azure/CLI@v1
        with:
          inlineScript: |
            changed="$CHANGED_REMOTES"
            all_remotes=$(jq -r '.[].name' host/public/remotes.json | tr '[:upper:]' '[:lower:]')
            for remote in $all_remotes; do
              # Require remoteEntry.js — a prior buggy upload could leave only .init placeholders
              has_entry=$(az storage blob list --account-name uiremotes --container-name '$web' --prefix "remotes/${remote}/latest/" --auth-mode login -o tsv 2>/dev/null | grep -c 'remoteEntry\.js' || true)
              if [ "$has_entry" -eq 0 ]; then
                if ! echo " $changed " | grep -q " $remote "; then
                  changed="$changed $remote"
                  echo "Remote missing remoteEntry.js in storage (will build): $remote"
                fi
              fi
            done
            echo "REMOTE_NAMES=$(echo $changed | xargs)" >> $GITHUB_ENV

      - name: Exit if no remotes to build
        if: env.REMOTE_NAMES == ''
        run: echo 'No changed or new remotes detected.'

      - name: Setup Node.js
        if: env.REMOTE_NAMES != ''
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"

      - name: Clean install from registry
        if: env.REMOTE_NAMES != ''
        run: npm ci --force

      - name: Build remotes
        if: env.REMOTE_NAMES != ''
        run: REMOTE_NAMES="$REMOTE_NAMES" npm run build:all

      - name: Upload remotes to Azure Storage
        if: env.REMOTE_NAMES != ''
        uses: azure/CLI@v1
        with:
          inlineScript: |
            tmpfile=$(mktemp)
            for remote in $REMOTE_NAMES; do
              lower=$(echo "$remote" | tr '[:upper:]' '[:lower:]')
              # Must match webpack output path: dist/<exact name from remotes.json>/<version>
              # (bash ${remote^} only capitalizes first letter — breaks "HumanProof" → wrong folder)
              remote_name=$(jq -r --arg l "$lower" '.[] | select(.name | ascii_downcase == $l) | .name' host/public/remotes.json)
              if [ -z "$remote_name" ] || [ "$remote_name" = "null" ]; then
                echo "::error::Remote '$lower' not found in host/public/remotes.json"
                exit 1
              fi
              version=$(grep -oP '"version":\s*"\K[^" ]+' "remotes/${lower}/package.json")
              src="dist/${remote_name}/${version}"
              if [ ! -f "$src/remoteEntry.js" ]; then
                echo "::error::Expected $src/remoteEntry.js missing — build output path mismatch?"
                ls -la "$src" 2>/dev/null || echo "(directory missing)"
                exit 1
              fi
              az storage blob upload --account-name uiremotes --container-name '$web' --file "$tmpfile" --name "remotes/${lower}/${version}/.init" --overwrite --auth-mode login
              az storage blob upload --account-name uiremotes --container-name '$web' --file "$tmpfile" --name "remotes/${lower}/latest/.init" --overwrite --auth-mode login
              az storage blob upload-batch --account-name uiremotes -s "$src" -d '$web' --destination-path "remotes/${lower}/${version}" --overwrite --auth-mode login
              az storage blob upload-batch --account-name uiremotes -s "$src" -d '$web' --destination-path "remotes/${lower}/latest" --overwrite --auth-mode login
            done
            rm "$tmpfile"
